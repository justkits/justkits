name: Link Packages to Repository

on:
  workflow_dispatch:

jobs:
  link:
    name: Link all packages to this repository
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Link packages to repository
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          REPO_NAME="${{ github.event.repository.name }}"

          REPO_ID=$(gh api graphql \
            -f query="{ repository(owner: \"${REPO_OWNER}\", name: \"${REPO_NAME}\") { id } }" \
            --jq '.data.repository.id')

          echo "Repository ID: ${REPO_ID}"

          for PACKAGE_NAME in "@justkits/design-foundations" "@justkits/motion" "@justkits/svg2tsx"; do
            echo "Processing ${PACKAGE_NAME}..."

            PKG_ID=$(gh api graphql \
              -f query="{ organization(login: \"${REPO_OWNER}\") { packages(packageType: NPM, names: [\"${PACKAGE_NAME}\"], first: 1) { nodes { id } } } }" \
              --jq '.data.organization.packages.nodes[0].id // empty' 2>/dev/null)

            if [ -n "${PKG_ID}" ]; then
              gh api graphql \
                -f query="mutation { linkRepositoryToPackage(input: { packageId: \"${PKG_ID}\", repositoryId: \"${REPO_ID}\" }) { package { name } } }" \
                && echo "✓ Linked ${PACKAGE_NAME} to ${REPO_OWNER}/${REPO_NAME}" \
                || echo "✗ Failed to link ${PACKAGE_NAME} (may already be linked or insufficient permissions)"
            else
              echo "✗ Package ${PACKAGE_NAME} not found"
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
